name: Back-in-stock alerts

on:
  schedule:
    # :30 every hour — runs 23 min after the scrape workflow so fresh products
    # have had time to land in Supabase.
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render emails but don't send"
        required: false
        default: "false"

concurrency:
  group: alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
      ALERT_FROM_NAME: ${{ secrets.ALERT_FROM_NAME }}
      ALERT_UNSUBSCRIBE_URL: ${{ secrets.ALERT_UNSUBSCRIBE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Dispatch alerts
        run: |
          python -m alden_finder.alerts.worker \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} -vv
