# Alden Finder retailer registry.
#
# Source of truth for the scrapers and the UI. Each entry:
#   name          — display name
#   url           — canonical home / Alden collection page
#   country       — ISO-3166 alpha-2
#   currency      — ISO-4217 as displayed on site
#   adapter_key   — name of the adapter in alden_finder/adapters/
#                   "shopify"     → generic Shopify (/collections/alden/products.json)
#                   "woo"         → generic WooCommerce
#                   "static"      → no e-commerce; UI shows "contact retailer"
#                   otherwise     → a bespoke module (alden_finder/adapters/<key>.py)
#   active        — scrape? false = "verify" or no-ecom (still shown in UI with badge)
#   rate_limit_s  — min seconds between requests to this domain
#   ships_to      — list of ISO-3166 alpha-2 codes the retailer ships to (best-effort)
#   source_type   — authorized | seconds | mto | resale
#   notes         — surfaced in UI as retailer tooltip
#
# To add a new retailer: open a PR editing only this file.
# Dealer opt-out: set active: false and add a note.

# ============================================================ United States
- name: The Alden Shop (official)
  url: https://www.aldenshop.com
